name: PR Automation

on:
  pull_request_target:
    types: [opened, synchronize, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  automate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Run automation
        run: python scripts/pr_automation.py
      - name: Apply label
        run: gh pr edit ${{ github.event.number }} --add-label "automated"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
