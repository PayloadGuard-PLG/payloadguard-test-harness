name: PR Labeler

on:
  pull_request_target:
    types: [opened, labeled]

permissions:
  pull-requests: read
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply labels
        run: python scripts/label_pr.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
