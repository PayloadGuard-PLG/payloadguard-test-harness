name: RT01-procmem-read
on: [pull_request]
jobs:
  rt01:
    runs-on: ubuntu-latest
    steps:
      - name: RT01 — open /proc/self/mem (own PID, safe, audit-only)
        run: |
          python3 -c "
          import os
          fd = os.open('/proc/self/mem', os.O_RDONLY)
          os.close(fd)
          print('RT01: /proc/self/mem open+close (self only)')
          " 2>/dev/null || true
