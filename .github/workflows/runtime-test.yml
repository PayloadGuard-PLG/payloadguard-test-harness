name: RT03-ptrace-self
on: [pull_request]
jobs:
  rt03:
    runs-on: ubuntu-latest
    steps:
      - name: RT03 — PTRACE_TRACEME self-attach (safe, no cross-process targeting)
        run: |
          python3 -c "
          import ctypes
          libc = ctypes.CDLL('libc.so.6', use_errno=True)
          libc.ptrace(0, 0, 0, 0)  # PTRACE_TRACEME=0, attaches to own process
          print('RT03: PTRACE_TRACEME complete')
          "
